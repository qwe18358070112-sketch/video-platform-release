<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="860" rx="28" fill="#0A1220"/>
  <text x="56" y="74" fill="#F8FBFF" font-size="38" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">项目亮点 / Project Highlights</text>

  <g>
    <rect x="56" y="120" width="716" height="300" rx="28" fill="#101C33" stroke="#2D4E86" stroke-width="2"/>
    <text x="96" y="182" fill="#EAF1FF" font-size="30" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">真实驻场场景 / Real Onsite Scenario</text>
    <text x="96" y="232" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">来自舟山市政法委雪亮工程一期驻场运维，不是教程 demo。</text>
    <text x="96" y="266" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">Built from a real government-enterprise surveillance patrol workflow.</text>
    <rect x="96" y="304" width="284" height="46" rx="12" fill="#EAF1FF"/>
    <text x="124" y="334" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">值班巡检 / Patrol Duty</text>
    <rect x="396" y="304" width="300" height="46" rx="12" fill="#EAF1FF"/>
    <text x="424" y="334" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">工具化落地 / Tooling Delivery</text>
  </g>

  <g>
    <rect x="828" y="120" width="716" height="300" rx="28" fill="#101C33" stroke="#2D4E86" stroke-width="2"/>
    <text x="868" y="182" fill="#EAF1FF" font-size="30" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">状态机调度 / State-Machine Automation</text>
    <text x="868" y="232" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">把“单击 -> 放大 -> 停留 -> 返回 -> 下一路”做成可恢复、可插入人工操作的调度链路。</text>
    <text x="868" y="266" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">Patrol actions are modeled as recoverable states instead of simple timed clicks.</text>
    <rect x="868" y="304" width="270" height="46" rx="12" fill="#EAF1FF"/>
    <text x="894" y="334" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">动作闭环 / Action Loop</text>
    <rect x="1154" y="304" width="318" height="46" rx="12" fill="#EAF1FF"/>
    <text x="1180" y="334" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">可恢复调度 / Recoverable Flow</text>
  </g>

  <g>
    <rect x="56" y="476" width="716" height="300" rx="28" fill="#101C33" stroke="#2D4E86" stroke-width="2"/>
    <text x="96" y="538" fill="#EAF1FF" font-size="30" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">异常恢复与人工接管 / Recovery + Human Override</text>
    <text x="96" y="588" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">处理黑屏、预览失败、前台漂移，并保留 F2/F9/F10/F11 人工监管能力。</text>
    <text x="96" y="622" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">Supports failure recovery and hotkey-based human takeover for real duty use.</text>
    <rect x="96" y="660" width="296" height="46" rx="12" fill="#EAF1FF"/>
    <text x="122" y="690" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">异常处理 / Failure Recovery</text>
    <rect x="408" y="660" width="260" height="46" rx="12" fill="#EAF1FF"/>
    <text x="434" y="690" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">热键接管 / Hotkeys</text>
  </g>

  <g>
    <rect x="828" y="476" width="716" height="300" rx="28" fill="#101C33" stroke="#2D4E86" stroke-width="2"/>
    <text x="868" y="538" fill="#EAF1FF" font-size="30" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">多宫格与跨电脑部署 / Multi-Layout + Multi-PC</text>
    <text x="868" y="588" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">支持 4/6/9/12 宫格、全屏/非全屏自动识别，以及固定宫格发布版本。</text>
    <text x="868" y="622" fill="#AFC0E0" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">Supports multiple layouts and deployment across different duty machines.</text>
    <rect x="868" y="660" width="276" height="46" rx="12" fill="#EAF1FF"/>
    <text x="896" y="690" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">多宫格支持 / Layouts</text>
    <rect x="1160" y="660" width="292" height="46" rx="12" fill="#EAF1FF"/>
    <text x="1188" y="690" fill="#1747A6" font-size="20" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">跨机部署 / Deployment</text>
  </g>
</svg>
